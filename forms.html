<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formas</title>
</head>

<body>
    <h1>HTML Formas</h1>

    <form action="">
        <fieldset>
            <legend>Personīgā informācija:</legend>
            <div class="formElement">
                <label for="nameInput">Jūsu vārds:</label>
                <input type="text" name="name" id="nameInput">
            </div>
            <div class="formElement">
                <label for="surnameInput">Jūsu uzvārds:</label>
                <input type="text" name="surname" id="surnameInput">
            </div>
            <div class="formElement">
                <label for="mailInput">Jūsu epasts:</label>
                <input type="email" name="surname" id="mailInput">
            </div>
            <div class="formElement">
                <label for="phoneInput">Jūsu tālrunis:</label>
                <input type="tel" name="surname" id="phoneInput">
            </div>
        </fieldset>

        <fieldset>
            <legend>Izveidot paroli:</legend>
            <div class="formElement">
                <label for="passwordInput">Jaunā parole:</label>
                <input type="password" name="password" id="passwordInput">
                <label for="passwordInput2">Jaunā parole vēlreiz:</label>
                <input type="password" name="passwordRepeat" id="passwordInput2">
            </div>
        </fieldset>

    </form>
</body>

</html>
