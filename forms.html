<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formas</title>
</head>

<body>
    <h1>HTML Formas</h1>

    <form action="">
        <fieldset>
            <legend>Personīgā informācija:</legend>
            <div class="formElement">
                <label for="nameInput">Jūsu vārds:</label>
                <input type="text" name="name" id="nameInput">
            </div>
            <div class="formElement">
                <label for="surnameInput">Jūsu uzvārds:</label>
                <input type="text" name="surname" id="surnameInput">
            </div>
            <div class="formElement">
                <label for="mailInput">Jūsu epasts:</label>
                <input type="email" name="surname" id="mailInput">
            </div>
            <div class="formElement">
                <label for="phoneInput">Jūsu tālrunis:</label>
                <input type="tel" name="surname" id="phoneInput">
            </div>
        </fieldset>

        <fieldset>
            <legend>Izveidot paroli:</legend>
            <div class="formElement">
                <label for="passwordInput">Jaunā parole:</label>
                <input type="password" name="password" id="passwordInput">
                <label for="passwordInput2">Jaunā parole vēlreiz:</label>
                <input type="password" name="passwordRepeat" id="passwordInput2">
            </div>
        </fieldset>
        <fieldset>
            <legend>Papildus dati:</legend>
            <div class="formElement">
                <label for="genderInput">Jūsu dzimums:</label>
                <select name="gender" id="genderInput">
                    <option value="virietis">Vīrietis</option>
                    <option value="sieviete">Sieviete</option>
                </select>
            </div>
            <div class="formElement">
                <label for="birthDate">Jūsu dzimšanas datums:</label>
                <input type="date" name="birthDate" id="birthDate">
            </div>
            <div class="formElement">
                <label for="biography">Jūsu biogrāfija:</label>
                <textarea name="biography" id="biography" cols="30" rows="10"></textarea>
            </div>
            <div class="formElement">
                <label for="profilePicture">Profila Bilde:</label>
                <input type="file" name="profilePicture" id="profilePicture">
                <!-- <input type="image" name="profilePicture" id="profilePicture"> -->
            </div>
        </fieldset>
        <fieldset>
            <legend>Profila iestatījumi:</legend>
            <div class="formElement">
                <input type="checkbox" name="activeProfile" id="activeProfile" value="true">
                <label for="activeProfile">Aktīvs profils:</label>
            </div>
        </fieldset>
        <input type="submit" value="Reģistrēties">
    </form>
</body>

</html>
